services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hyper-focus-productivity
    restart: always
    ports:
      - "8888:3000"
    environment:
      - NODE_ENV=production
      - HOST=0.0.0.0
      - DATABASE_URL=postgresql://postgres:Password123!@db:5432/hyperfocus?schema=public
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:8888/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  db:
    image: postgres:17.5
    restart: always
    # set shared memory limit when using docker compose
    shm_size: 128mb
    ports:
      - "5432:5432"
    environment:
      POSTGRES_PASSWORD: "Password123!"
      POSTGRES_USER: "postgres"
      POSTGRES_DB: "hyperfocus"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_data:
