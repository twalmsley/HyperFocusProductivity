
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hyper-focus-productivity
    restart: always
    ports:
      - "8888:3000"
    environment:
      - NODE_ENV=production
      - HOST=0.0.0.0
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  db:
    image: postgres:17.5
    restart: always
    # set shared memory limit when using docker compose
    shm_size: 128mb
    # or set shared memory limit when deploy via swarm stack
    environment:
      POSTGRES_PASSWORD: "Password123!"
